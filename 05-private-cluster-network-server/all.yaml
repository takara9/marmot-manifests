apiVersion: v1
kind: VirtualNetwork
metadata:
  name: private
  comment: ウェブサーバー用の仮想ネットワーク
spec:
  iPNetworkAddress: 172.16.50.0/24
  overlayMode: geneve
---
apiVersion: v1
kind: Server
metadata:
    name: server-50
    comment: プライベートネットワークに接続するサーバー
spec:
    cpu: 1
    memory: 1024
    mmImage: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: private
        - networkname: default
---
apiVersion: v1
kind: Server
metadata:
    name: server-51
    comment: プライベートネットワークに接続するサーバー
spec:
    cpu: 1
    memory: 1024
    mmImage: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: private
        - networkname: default
---
apiVersion: v1
kind: Server
metadata:
    name: server-52
    comment: プライベートネットワークに接続するサーバー
spec:
    cpu: 1
    memory: 1024
    mmImage: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: private
        - networkname: default
---
apiVersion: v1
kind: Gateway
metadata:
    name: igw
spec:
    bindPublicIpAddress: 10.10.0.50    # パブリック側のIPアドレスでアクセスを許可
    internalServerName: server-50        # サーバーの名前
    internalVirtualNetwork: private      # 内部側の仮想ネットワーク
    remoteCIDR: 10.10.0.0/16           # 接続を許すリモートのIPアドレス
    serverPorts:                         # リクエストを転送するポート番号のリストを以下に記述する
        - ssh                            # sshとhttpの通信を許可、それ以外は禁止    
        - http
