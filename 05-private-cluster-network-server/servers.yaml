apiVersion: v1
kind: VirtualNetwork
metadata:
  name: private
  comment: ウェブサーバー用の仮想ネットワーク
spec:
  iPNetworkAddress: 172.16.50.0/24
  overlayMode: geneve
---
apiVersion: v1
kind: Server
metadata:
    name: server-50
    comment: プライベートネットワークに接続するサーバー
spec:
    cpu: 1
    memory: 1024
    mmImage: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: private
        - networkname: default
---
