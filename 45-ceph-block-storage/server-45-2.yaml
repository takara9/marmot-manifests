apiVersion: v1
kind: Server
metadata:
    name: server-45-2
    comment: Cpehボリュームを使用するサーバー
spec:
    cpu: 1
    memory: 1048
    mmImage: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: host-bridge
    storage:
        - metadata:
            name: vol-45-2
          spec:
            type: ceph
            storageClass: ssd
            size: 1
            persistent: false
