apiVersion: v1
kind: VirtualNetwork
metadata:
  name: app-net
  comment: Webサーバー専用仮想ネットワーク
spec:
  iPNetworkAddress: 172.16.8.0/24
  overlayMode: geneve
---
apiVersion: v1
kind: Server
metadata:
    name: web-1
    comment: プライベートネットワークに接続するサーバー
    labels:
        app: web
spec:
    cpu: 1
    memory: 1024
    osVariant: websrv
    #osVariant: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: app-net
        - networkname: default
        - networkname: host-bridge
          address: 192.168.1.64
          nameservers:
            addresses:
                - 192.168.1.9
                - 8.8.8.8
                - 8.8.4.4
            search:
                - labo.local
          netmasklen: 24
          routes:
            - to: default
              via: 192.168.1.1
---
apiVersion: v1
kind: Server
metadata:
    name: web-2
    comment: プライベートネットワークに接続するサーバー
    labels:
        app: web
spec:
    cpu: 1
    memory: 1024
    osVariant: websrv
    #osVariant: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: app-net
        - networkname: default
---
apiVersion: v1
kind: Server
metadata:
    name: web-3
    comment: プライベートネットワークに接続するサーバー
    labels:
        app: web
spec:
    cpu: 1
    memory: 1024
    osVariant: websrv
    #osVariant: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: app-net
        - networkname: default
---
apiVersion: v1
kind: ApplicationLoadBalancer
metadata:
    name: alb-web
spec:
    bindPublicIpAddress: 192.168.1.70
    internalVirtualNetwork: app-net
    listeners:
        - name: web-http
          protocol: HTTP
          vipPort: 80
          backendPort: 80
          backendSelector:
              matchLabels:
                  app: web
          loadBalancingAlgorithm: roundrobin
          healthCheck:
              enabled: false
          sessionPersistence:
              enabled: false
