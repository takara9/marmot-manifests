apiVersion: v1
kind: Server
metadata:
    name: server-dhcp4
    comment: DHCPクライアントとして動作する仮想サーバー
spec:
    cpu: 1
    memory: 1024
    mmImage: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: host-bridge
          dhcp4: true
          dhcp6: false