apiVersion: v1
kind: Server
metadata:
    name: server-92
    comment: GitHubに登録した公開鍵でSSHログインできるサーバー
spec:
    cpu: 1
    memory: 1024
    mmImage: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
        users:
            - ubuntu
    networkInterface:
        - networkname: host-bridge
