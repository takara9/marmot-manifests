apiVersion: v1
kind: Server
metadata:
    name: master
    comment: K8sコントロールプレーン
    labels:
        cluster: k8s1
spec:
    cpu: 4
    memory: 8192
    mmImage: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: host-bridge
        - networkname: cluster-net
          address: 172.16.20.220
          netmasklen: 24
---
