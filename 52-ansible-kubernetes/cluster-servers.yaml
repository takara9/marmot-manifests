apiVersion: v1
kind: Server
metadata:
    name: master
    comment: K8sコントロールプレーン
    labels:
        cluster: k8s1
spec:
    cpu: 4
    memory: 8192
    osVariant: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: host-bridge
          address: 192.168.1.220
          netmasklen: 24
          routes:
            - to: default
              via: 192.168.1.1
          nameservers:
            addresses:
                - 192.168.1.9
            search:
                - labo.local
        - networkname: cluster-net
          address: 172.16.20.220
          netmasklen: 24
---
