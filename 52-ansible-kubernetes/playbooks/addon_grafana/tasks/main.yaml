#
# Grafana のインストール
#
- name: install Grafana step-1
  become_user: "{{ cluster_admin }}"
  shell: |
    helm repo add grafana https://grafana.github.io/helm-charts
    helm inspect values grafana/grafana > grafana-values.yaml
  args:
    chdir: "{{ temp_dir }}"

