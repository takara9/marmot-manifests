#
# Helm インストール
#
- name: install Grafana step-3
  become_user: "{{ cluster_admin }}"
  shell: |
    helm install grafana -f grafana-values.yaml grafana/grafana
  register: results_helm
  args:
    chdir: "{{ temp_dir }}"

- debug: msg="stdout  = {{ results_helm.stdout_lines }}"

- local_action: copy content="{{  results_helm.stdout_lines }}" dest="{{ temp_dir }}/helm_promethus_results"
  become_user: "{{ cluster_admin }}"



  
