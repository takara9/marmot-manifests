- name: Delete kubeadm_join.sh
  file:
    path: "{{ work_dir }}/kubeadm_join_{{ cluster_name }}.sh"
    state: absent

- template:
    src: join.sh.j2
    dest: "{{ work_dir }}/kubeadm_join_{{ cluster_name }}.sh"
    owner: root
    group: root
    mode: '0755'

