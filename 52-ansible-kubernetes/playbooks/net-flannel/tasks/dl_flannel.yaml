#
# Flannel のダウンロードと展開
#
- name: Download Flannel 
  stat:
    path: "{{ temp_dir }}/flannel-{{ flannel_version }}-linux-amd64.tar.gz"
  register: regi_flannel

- get_url:
    url: https://github.com/coreos/flannel/releases/download/{{ flannel_version }}/flannel-{{ flannel_version }}-linux-amd64.tar.gz
    dest: "{{ temp_dir }}"
    mode: '0644'
  when: regi_flannel.stat.exists == False

- unarchive:
    src:  "{{ temp_dir }}/flannel-{{ flannel_version }}-linux-amd64.tar.gz"
    dest: "{{ temp_dir }}"
    remote_src: True
  when: regi_flannel.stat.exists == False    



