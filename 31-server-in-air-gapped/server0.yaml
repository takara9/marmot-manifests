apiVersion: v1
kind: Server
metadata:
    name: server0
    comment: プライベートネットワークに接続するサーバー
spec:
    cpu: 1
    memory: 1024
    mmImage: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: private-net
        # - networkname: default この行をコメントすることで、サーバーはプライベートネットワークにのみ接続されます。