apiVersion: v1
kind: Server
metadata:
    name: web-n1
    comment: プライベートネットワークに接続するサーバー
    labels:
        app: web
spec:
    cpu: 1
    memory: 1024
    osVariant: websrv
    #osVariant: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: nlb-net
        - networkname: default
        - networkname: host-bridge
          address: 192.168.1.65
          nameservers:
            addresses:
                - 192.168.1.9
                - 8.8.8.8
                - 8.8.4.4
            search:
                - labo.local
          netmasklen: 24
          routes:
            - to: default
              via: 192.168.1.1
---
