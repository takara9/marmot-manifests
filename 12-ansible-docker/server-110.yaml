apiVersion: v1
kind: Server
metadata:
    name: server-110
    comment: Ansibleで、dockerコマンドをインストールするサーバー
spec:
    cpu: 2
    memory: 2028
    osVariant: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
        users:
         - root
         - ubuntu
    ansible-playbook: playbook/install.yaml
    networkInterface:
        - networkname: host-bridge
          address: 192.168.1.110
          netmasklen: 24
          nameservers:
            addresses:
                - 192.168.1.9
            search:
                - labo.local
          routes:
            - to: default
              via: 192.168.1.1
