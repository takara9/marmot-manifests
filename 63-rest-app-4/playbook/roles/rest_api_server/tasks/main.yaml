- name: Install Python runtime packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: yes

- name: Ensure service group exists
  ansible.builtin.group:
    name: "{{ rest_api_service_group }}"
    state: present

- name: Ensure service user exists
  ansible.builtin.user:
    name: "{{ rest_api_service_user }}"
    group: "{{ rest_api_service_group }}"
    shell: /usr/sbin/nologin
    create_home: false
    system: yes
    state: present

- name: Create application directory
  ansible.builtin.file:
    path: "{{ rest_api_app_dir }}"
    state: directory
    owner: "{{ rest_api_service_user }}"
    group: "{{ rest_api_service_group }}"
    mode: "0755"

- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv "{{ rest_api_venv_dir }}"
    creates: "{{ rest_api_venv_dir }}/pyvenv.cfg"

- name: Upgrade packaging tools inside the virtual environment
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    virtualenv: "{{ rest_api_venv_dir }}"

- name: Install REST API dependencies
  ansible.builtin.pip:
    name: "{{ rest_api_python_packages }}"
    virtualenv: "{{ rest_api_venv_dir }}"

- name: Install application source
  ansible.builtin.copy:
    src: app.py
    dest: "{{ rest_api_app_dir }}/app.py"
    owner: "{{ rest_api_service_user }}"
    group: "{{ rest_api_service_group }}"
    mode: "0644"

- name: Install MySQL environment file
  ansible.builtin.template:
    src: rest-api.env.j2
    dest: "/etc/default/{{ rest_api_service_name }}"
    owner: root
    group: root
    mode: "0644"

- name: Install systemd unit file
  ansible.builtin.template:
    src: rest-api.service.j2
    dest: "/etc/systemd/system/{{ rest_api_service_name }}.service"
    owner: root
    group: root
    mode: "0644"

- name: Reload systemd configuration
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start REST API service
  ansible.builtin.service:
    name: "{{ rest_api_service_name }}"
    enabled: true
    state: started