- name: setup servers
  hosts: all
  become: true
  gather_facts: yes
  vars:
    nginx_service_state: started
    nginx_service_enabled: true
    nginx_doc_root: /var/www/html
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Ensure nginx is enabled and running
      ansible.builtin.service:
        name: nginx
        state: "{{ nginx_service_state }}"
        enabled: "{{ nginx_service_enabled }}"

    - name: Allow Nginx through UFW (if ufw is in use)
      community.general.ufw:
        rule: allow
        name: "Nginx Full"
      when: ansible_facts.services is defined
      ignore_errors: true  # ufw未導入環境でも止まらないように

    - name: Verify nginx is responding
      ansible.builtin.uri:
        url: "http://localhost"
        status_code: 200
      register: result
      retries: 3
      delay: 2
      until: result.status == 200
 
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Ensure nginx is enabled and running
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: Deploy index.html showing hostname
      ansible.builtin.template:
        src: index.html.j2
        dest: "{{ nginx_doc_root }}/index.html"
        owner: www-data
        group: www-data
        mode: '0644'
      notify: Reload nginx

    - name: Verify page is responding
      ansible.builtin.uri:
        url: "http://localhost"
        status_code: 200
      register: result
      retries: 3
      delay: 2
      until: result.status == 200

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded