apiVersion: v1
kind: Server
metadata:
    name: server-106
    comment: ブートボリュームを拡張するサーバー
spec:
    cpu: 1
    memory: 1024
    osVariant: ubuntu24.04
    bootVolume:
        spec:
            size: 50
            type: qcow2
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: host-bridge
          address: 192.168.1.106
          netmasklen: 24
          routes:
            - to: default
              via: 192.168.1.1
          nameservers:
            addresses:
                - 192.168.1.9
                - 8.8.8.8
                - 8.8.4.4
            search:
                - labo.local
                - lab.local
