apiVersion: v1
kind: Server
metadata:
    name: server-42
    comment: サーバー作成時にボリューム作成するサーバー
spec:
    cpu: 1
    memory: 1048
    mmImage: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: host-bridge
    storage:
        - metadata:
            name: var-01
            comment: runnerの作業エリアとして利用
          spec:
            size: 2
        - metadata:
            name: for-vg1-01
            comment: OSディスク用のボリュームグループ用のボリューム
          spec:
            size: 1
        - metadata:
            name: for-vg2-01
            comment: DATAディスク用のボリュームグループ用のボリューム
          spec:
            size: 1
            persistent: true
