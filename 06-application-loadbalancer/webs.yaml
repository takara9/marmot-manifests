apiVersion: v1
kind: Server
metadata:
    name: web-1
    comment: プライベートネットワークに接続するサーバー
    labels:
        app: web3
spec:
    cpu: 1
    memory: 1024
    osVariant: webserver5
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: app-net
        - networkname: default
        - networkname: host-bridge
          address: 10.10.0.64
          nameservers:
            addresses:
                - 8.8.8.8
                - 8.8.8.8
                - 8.8.4.4
            search:
                - labo.local
          netmasklen: 24
          routes:
            - to: default
              via: 10.10.0.1
---
