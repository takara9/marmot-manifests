apiVersion: v1
kind: Server
metadata:
    name: web-1
    comment: プライベートネットワークに接続するサーバー
    labels:
        app: web
spec:
    cpu: 1
    memory: 1024
    osVariant: websrv
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: app-net
        - networkname: default
        - networkname: host-bridge
          address: 192.168.1.64
          nameservers:
            addresses:
                - 192.168.1.9
                - 8.8.8.8
                - 8.8.4.4
            search:
                - labo.local
          netmasklen: 24
          routes:
            - to: default
              via: 192.168.1.1
---
