apiVersion: v1
kind: Server
metadata:
    name: web-client
    comment: テスト用Webクライアント
spec:
    cpu: 1
    memory: 1024
    osVariant: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - networkname: webs-net
        - networkname: default
        - networkname: host-bridge
          address: 192.168.1.60
          nameservers:
            addresses:
                - 192.168.1.9
                - 8.8.8.8
                - 8.8.4.4
            search:
                - labo.local
                - lab.local
          netmasklen: 24
          routes:
            - to: default
              via: 192.168.1.1
